# Name of your application. Used to uniquely configure containers.
service: kakebo

# Name of the container image.
image: kraytruthg/kakebo

# Deploy to these servers.
servers:
  web:
    - 45.76.49.170

# Enable SSL via Let's Encrypt
proxy:
  ssl: true
  host: jerrylabs.cc

# Where you keep your container images.
registry:
  username: kraytruthg
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - KAKEBO_DATABASE_PASSWORD
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    SOLID_QUEUE_IN_PUMA: true
    # Database host - use the kamal docker network to connect to the db accessory
    DB_HOST: kakebo-db

# SSH config
ssh:
  user: deploy
  keys:
    - ~/.ssh/vultr_tokyo

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
volumes:
  - "kakebo_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# PostgreSQL database accessory
accessories:
  db:
    image: postgres:17
    host: 45.76.49.170
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: kakebo
        POSTGRES_DB: kakebo_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - kakebo_pgdata:/var/lib/postgresql/data
